<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Booking System</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Inter', 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  background-attachment: fixed;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  position: relative;
}

body::before {
  content: '';
  position: fixed; top: -200px; right: -200px;
  width: 600px; height: 600px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(240,147,251,.3), transparent 70%);
  filter: blur(60px);
  animation: floatOrb 12s ease-in-out infinite;
  pointer-events: none;
}
body::after {
  content: '';
  position: fixed; bottom: -150px; left: -150px;
  width: 500px; height: 500px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(79,172,254,.25), transparent 70%);
  filter: blur(60px);
  animation: floatOrb 15s ease-in-out infinite reverse;
  pointer-events: none;
}
@keyframes floatOrb {
  0%, 100% { transform: translate(0,0) scale(1); }
  50% { transform: translate(-30px,25px) scale(1.1); }
}

.login-container {
  background: rgba(255, 255, 255, 0.75);
  -webkit-backdrop-filter: blur(20px);
  backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,.45);
  border-radius: 24px;
  padding: 44px;
  box-shadow: 0 24px 48px rgba(0, 0, 0, 0.12), 0 8px 16px rgba(102,126,234,.1);
  width: 100%;
  max-width: 420px;
  animation: slideUp 0.6s ease-out;
}

@keyframes slideUp {
  from {
    opacity: 0;
    transform: translateY(30px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.login-header {
  text-align: center;
  margin-bottom: 30px;
}

.login-header h2 {
  color: #333;
  font-size: 2rem;
  font-weight: 600;
  margin-bottom: 8px;
}

.login-header p {
  color: #666;
  font-size: 0.95rem;
}

.input-group {
  position: relative;
  margin-bottom: 25px;
}

.input-group input {
  width: 100%;
  padding: 15px 20px;
  border: 1px solid rgba(102,126,234,.18);
  border-radius: 14px;
  font-size: 1rem;
  transition: all 0.3s ease;
  background: rgba(255,255,255,.6);
  backdrop-filter: blur(8px);
}

.input-group input:focus {
  outline: none;
  border-color: #667eea;
  background: rgba(255,255,255,.85);
  transform: translateY(-2px);
  box-shadow: 0 8px 25px rgba(102, 126, 234, 0.15);
}

.input-group input::placeholder {
  color: #adb5bd;
  transition: all 0.3s ease;
}

.input-group input:focus::placeholder {
  opacity: 0.7;
}

.login-btn {
  width: 100%;
  padding: 15px;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  border: none;
  border-radius: 14px;
  color: white;
  font-size: 1.1rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.3s ease;
  margin-bottom: 20px;
  position: relative;
  overflow: hidden;
}

.login-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 10px 25px rgba(102, 126, 234, 0.3);
}

.login-btn:active {
  transform: translateY(0);
}

.login-btn::before {
  content: '';
  position: absolute;
  top: 0;
  left: -100%;
  width: 100%;
  height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
  transition: left 0.5s;
}

.login-btn:hover::before {
  left: 100%;
}

.error {
  color: #e74c3c;
  background: #ffeaea;
  padding: 12px;
  border-radius: 8px;
  margin-bottom: 20px;
  border-left: 4px solid #e74c3c;
  font-size: 0.9rem;
  display: none;
}

.error.show {
  display: block;
  animation: shake 0.5s ease-in-out;
}

@keyframes shake {
  0%, 100% { transform: translateX(0); }
  25% { transform: translateX(-5px); }
  75% { transform: translateX(5px); }
}

.register-link {
  text-align: center;
  margin-top: 25px;
  padding-top: 25px;
  border-top: 1px solid #e1e5e9;
}

.register-link p {
  color: #666;
  font-size: 0.95rem;
}

.register-link a {
  color: #667eea;
  text-decoration: none;
  font-weight: 600;
  transition: all 0.3s ease;
}

.register-link a:hover {
  color: #764ba2;
  text-decoration: underline;
}

.loading {
  opacity: 0.7;
  pointer-events: none;
}

.loading .login-btn {
  background: #ccc;
  cursor: not-allowed;
}

.success-message {
  color: #27ae60;
  background: #eafaf1;
  padding: 12px;
  border-radius: 8px;
  margin-bottom: 20px;
  border-left: 4px solid #27ae60;
  font-size: 0.9rem;
  display: none;
}

.success-message.show {
  display: block;
  animation: fadeIn 0.5s ease-in-out;
}

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

.icon {
  position: absolute;
  right: 15px;
  top: 50%;
  transform: translateY(-50%);
  color: #adb5bd;
  transition: all 0.3s ease;
}

.input-group:focus-within .icon {
  color: #667eea;
}

@media (max-width: 480px) {
  .login-container {
    padding: 30px 20px;
    margin: 10px;
  }
  
  .login-header h2 {
    font-size: 1.75rem;
  }
}

.visually-hidden {
  position: absolute;
  width: 1px;
  height: 1px;
  padding: 0;
  margin: -1px;
  overflow: hidden;
  clip: rect(0, 0, 0, 0);
  white-space: nowrap;
  border: 0;
}
</style>
</head>
<body>
<div class="login-container">
  <div class="login-header">
    <h2>Welcome Back</h2>
    <p>Please sign in to your account</p>
  </div>
  
  <form id="login-form" autocomplete="on">
    <div class="input-group">
      <label for="login-email" class="visually-hidden">Email</label>
      <input type="email" id="login-email" placeholder="Enter your email" autocomplete="email" required>
      <span class="icon">📧</span>
    </div>

    <div class="input-group">
      <label for="login-password" class="visually-hidden">Password</label>
      <input type="password" id="login-password" placeholder="Enter your password" autocomplete="current-password" required>
      <span class="icon">🔒</span>
    </div>

    <div class="error" id="login-error"></div>
    <div class="success-message" id="success-message">Login successful! Redirecting...</div>

    <button type="submit" class="login-btn" id="login-btn">Sign In</button>
  </form>
  
  <div class="register-link">
    <p>Don't have an account? <a href="Register.html">Create one here</a></p>
  </div>
</div>

<!-- Script Module -->
<script type="module">
import { signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js";
import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js";
import { auth, db } from "./assets/js/firebase-config.js";

// --- Redirect ถ้า login แล้ว ---
onAuthStateChanged(auth, (user) => {
  if (user) { window.location.href = 'bookings.html'; return; }
});

// --- รอจน DOM โหลดเสร็จ ---
document.addEventListener("DOMContentLoaded", () => {
  const loginBtn = document.getElementById('login-btn');
  const errorEl = document.getElementById('login-error');
  const successEl = document.getElementById('success-message');
  const container = document.querySelector('.login-container');

  function showError(message) {
    errorEl.textContent = message;
    errorEl.classList.add('show');
    successEl.classList.remove('show');
  }

  function showSuccess(message) {
    successEl.textContent = message;
    successEl.classList.add('show');
    errorEl.classList.remove('show');
  }

  function hideMessages() {
    errorEl.classList.remove('show');
    successEl.classList.remove('show');
  }

  const loginForm = document.getElementById('login-form');
  loginForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = document.getElementById('login-email').value;
    const password = document.getElementById('login-password').value;
    
    hideMessages();

    if (!email || !password) {
      showError("Please fill in all fields");
      return;
    }

    // Add loading state
    container.classList.add('loading');
    loginBtn.textContent = 'Signing In...';

    try {
      const userCredential = await signInWithEmailAndPassword(auth, email, password);
      const uid = userCredential.user.uid;
      const userDoc = await getDoc(doc(db, "users", uid));
      
      if (!userDoc.exists()) {
        showError("User not found");
        return;
      }

      const role = userDoc.data().role;

      if(role === "No Access"){
        showError("บัญชีของคุณถูกระงับการใช้งาน กรุณาติดต่อผู้ดูแลระบบ");
        return;
      }
      else { 
        showSuccess("Login successful! Redirecting...");
        setTimeout(() => {
          window.location.href = "bookings.html";
        }, 1500);
      }

    } catch(error) {
      let errorMessage = "Login failed. Please try again.";
      
      if (error.code === 'auth/user-not-found' || error.code === 'auth/wrong-password' || error.code === 'auth/invalid-credential') {
        errorMessage = "Invalid email or password.";
      } else if (error.code === 'auth/invalid-email') {
        errorMessage = "Invalid email address.";
      } else if (error.code === 'auth/too-many-requests') {
        errorMessage = "Too many failed attempts. Please try again later.";
      }
      
      showError(errorMessage);
    } finally {
      // Remove loading state
      container.classList.remove('loading');
      loginBtn.textContent = 'Sign In';
    }
  });

  // Input validation feedback
  const inputs = document.querySelectorAll('input');
  inputs.forEach(input => {
    input.addEventListener('input', () => {
      hideMessages();
    });
  });
});
</script>
</body>
</html>
