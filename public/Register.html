<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register - Booking System</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Inter', 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  background-attachment: fixed;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  position: relative;
}
body::before {
  content: '';
  position: fixed; top: -200px; right: -200px;
  width: 600px; height: 600px; border-radius: 50%;
  background: radial-gradient(circle, rgba(240,147,251,.3), transparent 70%);
  filter: blur(60px);
  animation: floatOrb 12s ease-in-out infinite;
  pointer-events: none;
}
@keyframes floatOrb {
  0%, 100% { transform: translate(0,0) scale(1); }
  50% { transform: translate(-30px,25px) scale(1.1); }
}

.register-container {
  background: rgba(255, 255, 255, 0.75);
  -webkit-backdrop-filter: blur(20px);
  backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,.45);
  border-radius: 24px;
  padding: 44px;
  box-shadow: 0 24px 48px rgba(0,0,0,.12), 0 8px 16px rgba(102,126,234,.1);
  width: 100%;
  max-width: 420px;
  animation: slideUp 0.6s ease-out;
}

@keyframes slideUp {
  from {
    opacity: 0;
    transform: translateY(30px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.register-header {
  text-align: center;
  margin-bottom: 30px;
}

.register-header h2 {
  color: #333;
  font-size: 2rem;
  font-weight: 600;
  margin-bottom: 8px;
}

.register-header p {
  color: #666;
  font-size: 0.95rem;
}

.input-group {
  position: relative;
  margin-bottom: 25px;
}

.input-group input {
  width: 100%;
  padding: 15px 20px;
  border: 1px solid rgba(102,126,234,.18);
  border-radius: 14px;
  font-size: 1rem;
  transition: all 0.3s ease;
  background: rgba(255,255,255,.6);
  backdrop-filter: blur(8px);
  padding-right: 50px;
}

.input-group input:focus {
  outline: none;
  border-color: #667eea;
  background: rgba(255,255,255,.85);
  transform: translateY(-2px);
  box-shadow: 0 8px 25px rgba(102, 126, 234, 0.15);
}

.input-group input::placeholder {
  color: #adb5bd;
  transition: all 0.3s ease;
}

.input-group input:focus::placeholder {
  opacity: 0.7;
}

.input-group.valid input {
  border-color: #28a745;
}

.input-group.invalid input {
  border-color: #dc3545;
}

.register-btn {
  width: 100%;
  padding: 15px;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  border: none;
  border-radius: 12px;
  color: white;
  font-size: 1.1rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.3s ease;
  margin-bottom: 20px;
  position: relative;
  overflow: hidden;
}

.register-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 10px 25px rgba(102, 126, 234, 0.3);
}

.register-btn:active {
  transform: translateY(0);
}

.register-btn::before {
  content: '';
  position: absolute;
  top: 0;
  left: -100%;
  width: 100%;
  height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
  transition: left 0.5s;
}

.register-btn:hover::before {
  left: 100%;
}

.error {
  color: #e74c3c;
  background: #ffeaea;
  padding: 12px;
  border-radius: 8px;
  margin-bottom: 20px;
  border-left: 4px solid #e74c3c;
  font-size: 0.9rem;
  display: none;
}

.error.show {
  display: block;
  animation: shake 0.5s ease-in-out;
}

@keyframes shake {
  0%, 100% { transform: translateX(0); }
  25% { transform: translateX(-5px); }
  75% { transform: translateX(5px); }
}

.login-link {
  text-align: center;
  margin-top: 25px;
  padding-top: 25px;
  border-top: 1px solid #e1e5e9;
}

.login-link p {
  color: #666;
  font-size: 0.95rem;
}

.login-link a {
  color: #667eea;
  text-decoration: none;
  font-weight: 600;
  transition: all 0.3s ease;
}

.login-link a:hover {
  color: #764ba2;
  text-decoration: underline;
}

.loading {
  opacity: 0.7;
  pointer-events: none;
}

.loading .register-btn {
  background: #ccc;
  cursor: not-allowed;
}

.success-message {
  color: #27ae60;
  background: #eafaf1;
  padding: 12px;
  border-radius: 8px;
  margin-bottom: 20px;
  border-left: 4px solid #27ae60;
  font-size: 0.9rem;
  display: none;
  text-align: center;
}

.success-message.show {
  display: block;
  animation: fadeIn 0.5s ease-in-out;
}

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

.icon {
  position: absolute;
  right: 15px;
  top: 50%;
  transform: translateY(-50%);
  color: #adb5bd;
  transition: all 0.3s ease;
}

.input-group:focus-within .icon {
  color: #667eea;
}

.input-group.valid .icon {
  color: #28a745;
}

.input-group.invalid .icon {
  color: #dc3545;
}

.password-strength {
  margin-top: 8px;
  font-size: 0.8rem;
}

.strength-bar {
  height: 4px;
  background: #e1e5e9;
  border-radius: 2px;
  margin: 5px 0;
  overflow: hidden;
}

.strength-fill {
  height: 100%;
  transition: all 0.3s ease;
  border-radius: 2px;
}

.strength-weak { background: #dc3545; width: 25%; }
.strength-medium { background: #ffc107; width: 50%; }
.strength-good { background: #fd7e14; width: 75%; }
.strength-strong { background: #28a745; width: 100%; }

.requirements {
  margin-top: 10px;
  font-size: 0.8rem;
  color: #666;
}

.requirement {
  margin: 2px 0;
  transition: all 0.3s ease;
}

.requirement.met {
  color: #28a745;
}

.requirement::before {
  content: '●';
  margin-right: 5px;
  color: #dc3545;
  transition: all 0.3s ease;
}

.requirement.met::before {
  content: '✓';
  color: #28a745;
}

@media (max-width: 480px) {
  .register-container {
    padding: 30px 20px;
    margin: 10px;
  }
  
  .register-header h2 {
    font-size: 1.75rem;
  }
}

.visually-hidden {
  position: absolute;
  width: 1px;
  height: 1px;
  padding: 0;
  margin: -1px;
  overflow: hidden;
  clip: rect(0, 0, 0, 0);
  white-space: nowrap;
  border: 0;
}
</style>
</head>
<body>
<div class="register-container">
  <div class="register-header">
    <h2>Create Account</h2>
    <p>Join us and start booking today</p>
  </div>

  <form id="register-form" autocomplete="on">
  <div class="input-group" id="name-group">
    <label for="reg-name" class="visually-hidden">Full name</label>
    <input type="text" id="reg-name" placeholder="Enter your full name" autocomplete="name">
    <span class="icon">👤</span>
  </div>

  <div class="input-group" id="email-group">
    <label for="reg-email" class="visually-hidden">Email</label>
    <input type="email" id="reg-email" placeholder="Enter your email" autocomplete="email">
    <span class="icon">📧</span>
  </div>

  <div class="input-group" id="password-group">
    <label for="reg-password" class="visually-hidden">Password</label>
    <input type="password" id="reg-password" placeholder="Create a strong password" autocomplete="new-password">
    <span class="icon">🔒</span>
    <div class="password-strength">
      <div class="strength-bar">
        <div class="strength-fill" id="strength-fill"></div>
      </div>
      <div class="requirements">
        <div class="requirement" id="req-length">At least 6 characters</div>
        <div class="requirement" id="req-upper">One uppercase letter</div>
        <div class="requirement" id="req-lower">One lowercase letter</div>
        <div class="requirement" id="req-number">One number</div>
      </div>
    </div>
  </div>
  
  <div class="error" id="register-error"></div>
  <div class="success-message" id="success-message"></div>

  <button type="submit" class="register-btn" id="register-btn">Create Account</button>
  </form>

  <div class="login-link">
    <p>Already have an account? <a href="index.html">Sign in here</a></p>
  </div>
</div>

<script type="module">
import { createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js";
import { setDoc, doc } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js";
import { auth, db } from "./assets/js/firebase-config.js";

document.addEventListener('DOMContentLoaded', () => {
  const registerBtn = document.getElementById('register-btn');
  const errorEl = document.getElementById('register-error');
  const successEl = document.getElementById('success-message');
  const container = document.querySelector('.register-container');

  // Form elements
  const nameInput = document.getElementById('reg-name');
  const emailInput = document.getElementById('reg-email');
  const passwordInput = document.getElementById('reg-password');

  // Input groups
  const nameGroup = document.getElementById('name-group');
  const emailGroup = document.getElementById('email-group');
  const passwordGroup = document.getElementById('password-group');

  // Password strength elements
  const strengthFill = document.getElementById('strength-fill');
  const reqLength = document.getElementById('req-length');
  const reqUpper = document.getElementById('req-upper');
  const reqLower = document.getElementById('req-lower');
  const reqNumber = document.getElementById('req-number');

  function showError(message) {
    errorEl.textContent = message;
    errorEl.classList.add('show');
    successEl.classList.remove('show');
  }

  function showSuccess(message) {
    successEl.textContent = message;
    successEl.classList.add('show');
    errorEl.classList.remove('show');
  }

  function hideMessages() {
    errorEl.classList.remove('show');
    successEl.classList.remove('show');
  }

  const ALLOWED_DOMAINS = [
    'icpfertilizer.com',
    'icpinter.com',
    'r3lifewellness.com',
    'icpladda.com',
    'icpservicing.com',
    'iconkaset.com'
  ];

  function validateEmail(email) {
    const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    if (!emailRegex.test(email)) return false;
    const domain = email.split('@')[1].toLowerCase();
    return ALLOWED_DOMAINS.includes(domain);
  }

  function validateName(name) {
    return name.trim().length >= 2;
  }

  function checkPasswordStrength(password) {
    let strength = 0;
    const requirements = {
      length: password.length >= 6,
      upper: /[A-Z]/.test(password),
      lower: /[a-z]/.test(password),
      number: /\d/.test(password)
    };

    // Update requirement indicators
    reqLength.classList.toggle('met', requirements.length);
    reqUpper.classList.toggle('met', requirements.upper);
    reqLower.classList.toggle('met', requirements.lower);
    reqNumber.classList.toggle('met', requirements.number);

    // Calculate strength
    Object.values(requirements).forEach(met => {
      if (met) strength++;
    });

    // Update strength bar
    strengthFill.className = 'strength-fill';
    if (strength === 1) strengthFill.classList.add('strength-weak');
    else if (strength === 2) strengthFill.classList.add('strength-medium');
    else if (strength === 3) strengthFill.classList.add('strength-good');
    else if (strength === 4) strengthFill.classList.add('strength-strong');

    return strength >= 4;
  }

  function validateInput(input, group, validationFn) {
    const isValid = validationFn(input.value);
    group.classList.toggle('valid', isValid);
    group.classList.toggle('invalid', !isValid && input.value.length > 0);
    return isValid;
  }

  // Real-time validation
  nameInput.addEventListener('input', () => {
    validateInput(nameInput, nameGroup, validateName);
    hideMessages();
  });

  emailInput.addEventListener('input', () => {
    validateInput(emailInput, emailGroup, validateEmail);
    hideMessages();
  });

  passwordInput.addEventListener('input', () => {
    const isStrong = checkPasswordStrength(passwordInput.value);
    validateInput(passwordInput, passwordGroup, () => isStrong);
    hideMessages();
  });

  const registerForm = document.getElementById('register-form');
  registerForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    const name = nameInput.value.trim();
    const email = emailInput.value.trim();
    const password = passwordInput.value;
    
    hideMessages();

    // Validation
    if (!name || !email || !password) {
      showError("Please fill in all fields");
      return;
    }

    if (!validateName(name)) {
      showError("Name must be at least 2 characters long");
      return;
    }

    if (!validateEmail(email)) {
      showError("กรุณาใช้อีเมลองค์กรเท่านั้น (@icpfertilizer.com, @icpinter.com, @r3lifewellness.com, @icpladda.com, @icpservicing.com, @iconkaset.com)");
      return;
    }

    if (!checkPasswordStrength(password)) {
      showError("Password must meet all requirements");
      return;
    }

    // Add loading state
    container.classList.add('loading');
    registerBtn.textContent = 'Creating Account...';

    try {
      const userCredential = await createUserWithEmailAndPassword(auth, email, password);
      const uid = userCredential.user.uid;
      await setDoc(doc(db, "users", uid), {
        name,
        email,
        role: "Staff",
        createdAt: new Date().toISOString()
      });
      
      showSuccess("สร้างบัญชีสำเร็จแล้ว! กำลังเปลี่ยนไปหน้าเข้าสู่ระบบ...");
      
      // Clear form
      nameInput.value = '';
      emailInput.value = '';
      passwordInput.value = '';
      
      // Reset validation states
      nameGroup.classList.remove('valid', 'invalid');
      emailGroup.classList.remove('valid', 'invalid');
      passwordGroup.classList.remove('valid', 'invalid');
      
      // Reset password strength
      strengthFill.className = 'strength-fill';
      document.querySelectorAll('.requirement').forEach(req => req.classList.remove('met'));
      
      setTimeout(() => {
        window.location.href = "index.html";
      }, 3000);
      
    } catch(error) {
      let errorMessage = "Registration failed. Please try again.";
      
      if (error.code === 'auth/email-already-in-use') {
        errorMessage = "An account with this email already exists.";
      } else if (error.code === 'auth/invalid-email') {
        errorMessage = "Invalid email address.";
      } else if (error.code === 'auth/weak-password') {
        errorMessage = "Password is too weak.";
      }
      
      showError(errorMessage);
    } finally {
      // Remove loading state
      container.classList.remove('loading');
      registerBtn.textContent = 'Create Account';
    }
  });

});
</script>
</body>
</html>
