<!doctype html>
<html lang="th" data-bs-theme="light">
<script>document.documentElement.setAttribute('data-bs-theme', localStorage.getItem('theme') || 'light');</script>

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>จองห้องประชุม • Calendar</title>

  <!-- Bootstrap CSS + Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <!-- ของเดิม -->
  <link href="assets/css/styles.css" rel="stylesheet" />
  <script src="assets/js/menu.js" defer></script>

  <!-- FullCalendar -->
  <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/main.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js"></script>

  <style>
    /* input ที่ readonly ให้เป็นสีเทา เพื่อบอกผู้ใช้ว่าไม่ต้องกรอก */
    input.form-control[readonly],
    input.form-control.readonly {
      background-color: #f1f1f1 !important;
      color: #888 !important;
      border-color: #e0e0e0;
      cursor: not-allowed;
      opacity: 1;
    }

    /* ปรับ input[type='date'] ให้สูงเท่ากับ dropdown และ card calendar */
    input[type='date'].form-control {
      height: 48px;
      min-height: 40px;
      font-size: 1rem;
      padding-top: 10px;
      padding-bottom: 10px;
      box-sizing: border-box;
    }

    /* ปรับความสูง dayGrid ให้พอดีกับ calendar */
    #calendar .fc-daygrid-body {
      height: 100% !important;
      min-height: 0;
      max-height: 100%;
      display: flex;
      flex-direction: column;
    }

    #calendar .fc-daygrid-body>table {
      height: 100% !important;
      min-height: 0;
      max-height: 100%;
      table-layout: fixed;
    }

    #calendar .fc-daygrid-body>table>tbody>tr {
      height: auto;
    }

    #calendar .fc-daygrid-day {
      height: 100%;
      vertical-align: top;
    }

    /* ปรับ dayGrid ให้พอดีกับ calendar */
    #calendar .fc-daygrid-body,
    #calendar .fc-scroller {
      flex: 1 1 auto;
      height: 100% !important;
      min-height: 0;
      max-height: 100%;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }

    :root {
      --card-shadow: 0 10px 28px rgba(0, 0, 0, .08);
      --ring: 0 0 0 .2rem rgba(13, 110, 253, .25);
    }

    body {
      padding-top: 72px;
      font-family: Arial, sans-serif;
    }

    .card {
      border: 0;
      box-shadow: var(--card-shadow);
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 16px;
    }

    /* เว้นระยะ dropdown เลือกห้องใน modal */
    #roomSelectWrap {
      margin-top: 12px;
    }

    .btn-soft {
      background: var(--bs-secondary-bg);
      border: 0;
    }

    .btn-soft:hover {
      background: var(--bs-tertiary-bg);
    }

    .avatar-circle {
      width: 36px;
      height: 36px;
      background: #0d6efd;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      font-weight: bold;
    }

    /* ทำให้ main กว้างเต็มหน้าจอ */
    main.container,
    main.container-fluid {
      max-width: 100% !important;
      width: 100% !important;
    }

    /* ===== Action bar (ด้านบนของ main) ===== */
    .action-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: .75rem;
      padding: 8px 0 4px;
      margin-bottom: .5rem;
      border-bottom: 1px dashed var(--bs-border-color);
    }

    .action-bar .btn {
      box-shadow: 0 6px 16px rgba(13, 110, 253, .12);
    }

    /* ===== FullCalendar – โทนสวยและอ่านง่าย ===== */
    #calendar .fc-toolbar {
      gap: .5rem;
    }

    #calendar .fc-toolbar-title {
      font-weight: 800;
      letter-spacing: .2px;
    }

    /* ปรับ calendar และ statusCard ให้สูงสมส่วนกัน */
    .row.g-3 {
      align-items: stretch;
    }

    #calendar {
      min-height: 70vh;
      display: flex;
      flex-direction: column;
    }

    #statusCard {
      min-height: 70vh;
      display: flex;
      flex-direction: column;
    }

    .fc .fc-button {
      border-radius: 12px;
    }

    .fc .fc-button-primary:focus {
      box-shadow: var(--ring);
    }

    .fc-theme-standard td,
    .fc-theme-standard th {
      border-color: var(--bs-border-color);
    }

    .fc .fc-col-header-cell {
      background: var(--bs-secondary-bg);
    }

    /* วันนี้ไฮไลท์ */
    .fc .fc-daygrid-day.fc-day-today {
      background: linear-gradient(180deg, rgba(13, 110, 253, .08), transparent 70%);
    }

    .fc .fc-daygrid-day-frame:hover {
      box-shadow: inset 0 0 0 2px rgba(13, 110, 253, .15);
    }

    /* เสาร์-อาทิตย์สีจาง */
    .fc .fc-day-sat .fc-daygrid-day-frame,
    .fc .fc-day-sun .fc-daygrid-day-frame {
      background: linear-gradient(180deg, rgba(108, 117, 125, .06), transparent 70%);
    }

    /* --- รีเซ็ตสไตล์ลิงก์เฉพาะในปฏิทิน (ตัดสีน้ำเงิน/เส้นใต้จาก _reboot.scss) --- */
    #calendar :where(a, a:visited, .fc a, .fc-daygrid-more-link, .fc-list a) {
      color: inherit !important;
      text-decoration: none !important;
    }

    #calendar a:focus-visible {
      outline: 0;
      border-radius: 8px;
      box-shadow: 0 0 0 .2rem rgba(13, 110, 253, .25);
    }

    /* หมายเลขวันเป็นชิป และเน้น “วันนี้” */
    #calendar .fc-daygrid-day-number {
      padding: 4px 6px;
      border-radius: 8px;
      font-weight: 700;
      opacity: .9;
    }

    #calendar .fc-daygrid-day.fc-day-today .fc-daygrid-day-number {
      background: rgba(13, 110, 253, .12);
      color: #0d6efd;
    }

    /* ปุ่ม “+ อีก n รายการ” เป็น pill */
    #calendar .fc-daygrid-more-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 2px 8px !important;
      border-radius: 999px;
      font-size: .72rem;
      font-weight: 700;
      background: rgba(13, 110, 253, .08);
      border: 1px solid rgba(13, 110, 253, .35);
      color: #0d6efd !important;
    }

    #calendar .fc-daygrid-more-link:hover {
      background: rgba(13, 110, 253, .12);
    }

    /* ===== อีเวนต์ ultra-compact ===== */
    #calendar .fc-event {
      padding: 0 !important;
      margin: 0 !important;
      border-radius: 8px !important;
    }

    #calendar .fc-event .fc-event-main {
      padding: 0 !important;
      font-size: .72rem;
      line-height: 1.05;
    }

    #calendar .fc-event.fc-event-start,
    #calendar .fc-event.fc-event-end {
      margin: 0 !important;
    }

    /* Month (dayGrid) ให้กะทัดรัด */
    #calendar .fc-daygrid-day-events {
      margin: 0 1px;
    }

    #calendar .fc-daygrid-event-harness {
      margin: 1px 0 !important;
    }

    #calendar .fc-daygrid-event {
      padding: 0 !important;
    }

    #calendar .fc-daygrid-dot-event {
      padding: 0 2px !important;
    }

    #calendar .fc-daygrid-dot-event .fc-event-title {
      font-size: .7rem;
      line-height: 1.1;
    }

    #calendar .fc-daygrid-more-link {
      font-size: .68rem;
      line-height: 1;
      padding: 0 3px;
    }

    /* การ์ดอีเวนต์ที่เราวาดเอง */
    .evt {
      --evt-h: 210;
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 2px 6px;
      border-radius: 8px;
      min-height: 18px;
      background: linear-gradient(135deg, hsl(var(--evt-h) 85% 95%), hsl(var(--evt-h) 85% 97%));
      border: 1px solid hsl(var(--evt-h) 50% 70%);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, .35), 0 1px 0 rgba(0, 0, 0, .02);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      transition: box-shadow .15s ease, transform .15s ease;
    }

    .evt.mine {
      background: linear-gradient(135deg, hsl(var(--evt-h) 70% 94%), hsl(var(--evt-h) 70% 97%));
    }

    .evt.admin {
      background: linear-gradient(135deg, hsl(0 80% 96%), hsl(0 80% 98%));
      border-color: hsl(0 55% 78%);
    }

    .evt .time {
      font-variant-numeric: tabular-nums;
      font-weight: 800;
      font-size: 12px;
      color: hsl(var(--evt-h) 60% 32%);
    }

    .evt .room {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-weight: 700;
      font-size: 12px;
      background: #fff;
      border: 1px dashed hsl(var(--evt-h) 35% 68%);
      padding: 1px 6px;
      border-radius: 999px;
    }

    #calendar .fc-event:hover .evt {
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, .5), 0 0 0 2px hsl(var(--evt-h) 70% 85% / .7), 0 6px 16px rgba(0, 0, 0, .06);
      transform: translateY(-1px);
    }

    /* ===== Booking Hover Tooltip ===== */
    .booking-tooltip {
      position: fixed;
      z-index: 99999;
      pointer-events: none;
      min-width: 240px;
      max-width: 320px;
      padding: 14px 16px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.5);
      box-shadow: 0 12px 40px rgba(102, 126, 234, 0.18), 0 4px 12px rgba(0,0,0,.08);
      opacity: 0;
      transform: translateY(6px) scale(.97);
      transition: opacity .18s ease, transform .18s ease;
      font-size: 13px;
      color: #2d3748;
      line-height: 1.5;
    }
    .booking-tooltip.show {
      opacity: 1;
      transform: translateY(0) scale(1);
    }
    .booking-tooltip .tt-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
      padding-bottom: 8px;
      border-bottom: 1px solid rgba(102, 126, 234, 0.12);
    }
    .booking-tooltip .tt-color-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .booking-tooltip .tt-title {
      font-weight: 700;
      font-size: 14px;
      color: #2d3748;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .booking-tooltip .tt-row {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 3px 0;
    }
    .booking-tooltip .tt-row i {
      width: 16px;
      text-align: center;
      flex-shrink: 0;
      margin-top: 2px;
      font-size: 12px;
      opacity: .6;
    }
    .booking-tooltip .tt-label {
      color: #718096;
      font-size: 12px;
      min-width: 50px;
    }
    .booking-tooltip .tt-value {
      font-weight: 600;
      color: #2d3748;
    }
    .booking-tooltip .tt-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
    }
    .booking-tooltip .tt-mine {
      background: rgba(72, 187, 120, .12);
      color: #2f855a;
    }
    .booking-tooltip .tt-other {
      background: rgba(102, 126, 234, .10);
      color: #5a67d8;
    }

    /* Tooltip dark mode */
    [data-bs-theme="dark"] .booking-tooltip {
      background: rgba(26, 32, 44, 0.92);
      border-color: rgba(255, 255, 255, 0.08);
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.4), 0 4px 12px rgba(0,0,0,.2);
      color: #e2e8f0;
    }
    [data-bs-theme="dark"] .booking-tooltip .tt-header {
      border-bottom-color: rgba(255, 255, 255, 0.08);
    }
    [data-bs-theme="dark"] .booking-tooltip .tt-title {
      color: #f7fafc;
    }
    [data-bs-theme="dark"] .booking-tooltip .tt-label {
      color: #a0aec0;
    }
    [data-bs-theme="dark"] .booking-tooltip .tt-value {
      color: #e2e8f0;
    }
    [data-bs-theme="dark"] .booking-tooltip .tt-mine {
      background: rgba(72, 187, 120, .15);
      color: #68d391;
    }
    [data-bs-theme="dark"] .booking-tooltip .tt-other {
      background: rgba(102, 126, 234, .15);
      color: #a3bffa;
    }

    /* Week/Day (timeGrid) แน่นขึ้น */
    #calendar .fc-timegrid-slot {
      height: 1.8rem;
    }

    #calendar .fc-timegrid-event {
      margin: 0 !important;
    }

    #calendar .fc-timegrid-event .fc-event-main {
      padding: 2px 4px !important;
    }

    #calendar .fc-timegrid-event .evt {
      min-height: 18px;
    }

    /* List view */
    #calendar .fc-list .fc-list-event-time,
    #calendar .fc-list .fc-list-event-title {
      font-size: .8rem;
    }

    #calendar .fc-list-table td {
      padding: 4px 8px;
    }

    /* ===== แผงสถานะวันนี้ (ขวา) — สีตามห้องผ่าน --room-h ===== */
    .room-card {
      --room-h: 210;
      position: relative;
      border: 1px solid hsl(var(--room-h) 45% 72%/ .9);
      border-left-width: 6px;
      border-radius: 14px;
      padding: 12px 12px 12px 16px;
      background: linear-gradient(180deg, hsl(var(--room-h) 95% 99% / .9), var(--bs-body-bg));
      box-shadow: inset 0 0 0 1px hsl(var(--room-h) 95% 95% / .7), 0 6px 20px rgba(0, 0, 0, .05);
    }

    .room-card .title {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 800;
      margin-bottom: 8px;
    }

    .room-card .title .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: hsl(var(--room-h) 70% 50%);
      box-shadow: 0 0 0 4px hsl(var(--room-h) 95% 93%);
    }

    .room-card .pill {
      border: 1px solid hsl(var(--room-h) 35% 70%);
      padding: 2px 8px;
      border-radius: 999px;
      font-size: .8rem;
      background: hsl(var(--room-h) 100% 98%);
      color: hsl(var(--room-h) 40% 28%);
    }

    /* ชิปสถานะสด (กระพริบ) */
    .live-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 2px 8px;
      border-radius: 999px;
      font-weight: 700;
      font-size: .75rem;
      margin-left: 8px;
      border: 1px solid;
    }

    .live-pill .beacon {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      display: inline-block;
    }

    .live-pill.free {
      background: rgba(25, 135, 84, .08);
      border-color: rgba(25, 135, 84, .35);
      color: #198754;
    }

    .live-pill.free .beacon {
      background: #198754;
      animation: pulseFree 1.2s infinite;
    }

    .live-pill.busy {
      background: rgba(220, 53, 69, .10);
      border-color: rgba(220, 53, 69, .45);
      color: #dc3545;
    }

    .live-pill.busy .beacon {
      background: #dc3545;
      animation: pulseBusy 1.2s infinite;
    }

    @keyframes pulseFree {
      0% {
        box-shadow: 0 0 0 0 rgba(25, 135, 84, .55);
      }

      70% {
        box-shadow: 0 0 0 8px rgba(25, 135, 84, 0);
      }

      100% {
        box-shadow: 0 0 0 0 rgba(25, 135, 84, 0);
      }
    }

    @keyframes pulseBusy {
      0% {
        box-shadow: 0 0 0 0 rgba(220, 53, 69, .6);
      }

      70% {
        box-shadow: 0 0 0 8px rgba(220, 53, 69, 0);
      }

      100% {
        box-shadow: 0 0 0 0 rgba(220, 53, 69, 0);
      }
    }

    .section-label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: .8rem;
      font-weight: 700;
      color: var(--bs-secondary-color);
      margin: 8px 0 6px;
    }

    .section-label::after {
      content: "";
      flex: 1;
      height: 1px;
      border-radius: 999px;
      background: linear-gradient(90deg, hsl(var(--room-h) 60% 80%), transparent);
      opacity: .8;
    }

    .status-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      border: 1px solid hsl(var(--room-h) 30% 75% / .9);
      border-radius: 12px;
      padding: 8px 10px;
      background: hsl(var(--room-h) 100% 98%);
    }

    .status-item i {
      color: hsl(var(--room-h) 55% 40%);
      opacity: .95;
    }

    .status-chip {
      font-variant-numeric: tabular-nums;
      font-weight: 800;
      padding: 2px 8px;
      border-radius: 10px;
      background: #fff;
      border: 1px dashed hsl(var(--room-h) 30% 75%);
    }

    .status-kind-now .status-item {
      background: linear-gradient(90deg, hsl(var(--room-h) 95% 95%), #fff);
      border-color: hsl(var(--room-h) 45% 65%);
    }

    .status-kind-prev .status-item {
      background: linear-gradient(90deg, hsl(var(--room-h) 20% 97%), #fff);
      border-color: hsl(var(--room-h) 15% 78% / .7);
    }

    .status-kind-next .status-item {
      background: linear-gradient(90deg, hsl(var(--room-h) 85% 96%), #fff);
      border-color: hsl(var(--room-h) 35% 72%);
    }

    /* หัวการ์ดสถานะ */
    #statusCard .panel-head {
      background: linear-gradient(90deg, rgba(13, 110, 253, .08), rgba(25, 135, 84, .08));
      border-radius: 12px;
      padding: 8px 12px;
      margin: -8px -8px 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    /* Sticky แผงสถานะบนเดสก์ท็อป */
    @media (min-width:1200px) {
      #statusCard {
        position: sticky;
        top: 88px;
      }
    }

    /* มือถือ */
    @media (max-width:575.98px) {
      #calendar .fc-toolbar-title {
        font-size: 1rem;
      }

      #calendar .fc-daygrid-more-link {
        font-size: .64rem;
      }

      .evt .time,
      .evt .room {
        font-size: .68rem;
      }
    }

    /* ===== Dark Mode Overrides ===== */
    [data-bs-theme="dark"] .evt {
      background: linear-gradient(135deg, hsl(var(--evt-h) 50% 18%), hsl(var(--evt-h) 45% 22%));
      border-color: hsl(var(--evt-h) 40% 35%);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.06), 0 1px 0 rgba(0,0,0,.15);
    }
    [data-bs-theme="dark"] .evt.mine {
      background: linear-gradient(135deg, hsl(var(--evt-h) 45% 20%), hsl(var(--evt-h) 40% 25%));
    }
    [data-bs-theme="dark"] .evt.admin {
      background: linear-gradient(135deg, hsl(0 40% 20%), hsl(0 35% 25%));
      border-color: hsl(0 35% 40%);
    }
    [data-bs-theme="dark"] .evt .time {
      color: hsl(var(--evt-h) 70% 78%);
    }
    [data-bs-theme="dark"] .evt .room {
      background: hsl(var(--evt-h) 30% 15%);
      border-color: hsl(var(--evt-h) 30% 40%);
      color: hsl(var(--evt-h) 60% 80%);
    }
    [data-bs-theme="dark"] #calendar .fc-event:hover .evt {
      box-shadow: inset 0 1px 0 rgba(255,255,255,.1), 0 0 0 2px hsl(var(--evt-h) 50% 40% / .5), 0 6px 16px rgba(0,0,0,.25);
    }

    /* Room status cards */
    [data-bs-theme="dark"] .room-card {
      background: linear-gradient(180deg, hsl(var(--room-h) 30% 14% / .9), var(--bs-body-bg));
      border-color: hsl(var(--room-h) 35% 30% / .9);
      box-shadow: inset 0 0 0 1px hsl(var(--room-h) 20% 20% / .5), 0 6px 20px rgba(0,0,0,.2);
    }
    [data-bs-theme="dark"] .room-card .title .dot {
      background: hsl(var(--room-h) 60% 55%);
      box-shadow: 0 0 0 4px hsl(var(--room-h) 30% 20%);
    }
    [data-bs-theme="dark"] .room-card .pill {
      background: hsl(var(--room-h) 30% 15%);
      border-color: hsl(var(--room-h) 30% 35%);
      color: hsl(var(--room-h) 50% 75%);
    }
    [data-bs-theme="dark"] .status-item {
      background: hsl(var(--room-h) 25% 14%);
      border-color: hsl(var(--room-h) 25% 30% / .9);
    }
    [data-bs-theme="dark"] .status-item i {
      color: hsl(var(--room-h) 50% 65%);
    }
    [data-bs-theme="dark"] .status-chip {
      background: hsl(var(--room-h) 20% 12%);
      border-color: hsl(var(--room-h) 25% 35%);
      color: hsl(var(--room-h) 60% 80%);
    }

  <!-- Alert Modal -->
  <div class="modal fade" id="alertModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-sm modal-dialog-centered">
      <div class="modal-content">

          <h6 class="modal-title">แจ้งเตือน</h6>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="ปิด"></button>

  <!-- Toast -->
  <div class="position-fixed bottom-0 end-0 p-3" style="z-index:1080">
    <div id="toast" class="toast align-items-center text-bg-dark border-0" role="alert" aria-live="assertive"
      aria-atomic="true">
      <div class="d-flex">
        <div class="toast-body" id="toastBody">ดำเนินการสำเร็จ</div>
        <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"
          aria-label="Close"></button>
      </div>
    </div>
  </div>

  <!-- Firebase + App -->
  <script type="module">
    import {
      collection, deleteDoc, onSnapshot, query, orderBy,
      serverTimestamp, doc, getDoc, where, getDocs
    } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js";
    import { getFunctions, httpsCallable } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-functions.js";
    import { db, app } from "./assets/js/firebase-config.js";
    import { initAuthGuard } from "./assets/js/auth-guard.js";
    import { escapeHTML, $ } from "./assets/js/utils.js";

    // Cloud Functions
    const functions = getFunctions(app, "asia-southeast1");
    const createBookingFn = httpsCallable(functions, "createBooking");
    const updateBookingFn = httpsCallable(functions, "updateBooking");

    // ---- UI helpers ----
    let toast;
    document.addEventListener('DOMContentLoaded', () => {
      // eslint-disable-next-line no-undef
      toast = new bootstrap.Toast($('#toast'), { delay: 1800 });
    });
    const showToast = (m) => { $('#toastBody').textContent = m; toast.show(); };
    const showPopup = (m) => { $('#alertText').textContent = m; /* eslint-disable-next-line no-undef */ new bootstrap.Modal($('#alertModal')).show(); };

    // ---- Role / User ----
    let currentUser = null;  // {user, role, name}

    // ---- Date & Time utils (รวมศูนย์และประกาศก่อนใช้งาน) ----
    const fmt2 = (n) => String(n).padStart(2, '0');
    const toYmd = (d) => [d.getFullYear(), fmt2(d.getMonth() + 1), fmt2(d.getDate())].join('-');
    const ymd = (date) => `${date.getFullYear()}-${fmt2(date.getMonth() + 1)}-${fmt2(date.getDate())}`;

    const toMin = (s) => { const [h, m] = (s || '0:0').split(':').map(n => +n || 0); return h * 60 + m; };
    const minToHH = (min) => `${fmt2(Math.floor(min / 60))}:${fmt2(min % 60)}`;
    const roundUpToNext30 = (min) => Math.ceil(min / 30) * 30;  // 08:10 -> 08:30, 08:31 -> 09:00
    const nowHM = () => { const d = new Date(); return `${fmt2(d.getHours())}:${fmt2(d.getMinutes())}`; };
    const hm2m = toMin;

    // ---- Booking settings (loaded from Firestore, fallback to defaults) ----
    let BOOKING_START = 8 * 60;   // 08:00
    let BOOKING_END   = 19 * 60;  // 19:00
    let SLOT_INTERVAL = 30;       // minutes

    async function loadBookingSettings() {
      try {
        const snap = await getDoc(doc(db, 'settings', 'booking'));
        if (snap.exists()) {
          const d = snap.data();
          if (d.bookingStartTime) BOOKING_START = toMin(d.bookingStartTime);
          if (d.bookingEndTime)   BOOKING_END   = toMin(d.bookingEndTime);
          if (d.slotInterval)     SLOT_INTERVAL = +d.slotInterval || 30;
        }
      } catch(_) { /* use defaults */ }
    }

    // ---- State ----
    let rooms = [];
    const roomsRef = collection(db, 'meeting_rooms');
    const meetingsRef = collection(db, 'meetings');

    // ---- Auth ----
    initAuthGuard(async (user, name, role) => {
      currentUser = { user, role, name };
      // แสดงชื่อผู้ดำเนินการใน modal
      const opName = document.getElementById('loginOperatorName');
      if (opName) opName.textContent = name || 'ผู้ใช้';
      await loadBookingSettings();
      init();
    });

    // ===== สี (hue) จาก id ห้อง =====
    function hueFromString(s) {
      if (!s) return 210;
      let h = 0; for (let i = 0; i < s.length; i++) { h = (h * 31 + s.charCodeAt(i)) % 360; }
      return Math.round((h / 360) * 330);
    }

    // ================= FullCalendar =================
    let calendar; let unsubCal = null;

    // ฟังก์ชัน refresh ข้อมูล calendar ทั้งหมด
    function refreshCalendarData() {
      if (!calendar) return;

      calendar.refetchEvents();

      // Fallback: retry once after delay
      setTimeout(() => {
        if (calendar && calendar.getEvents().length === 0) {
          calendar.refetchEvents();
        }
      }, 300);
    }

    function toEvents(docs) {
      docs.sort((a, b) => (a.date || '').localeCompare(b.date || '') || (a.start || '').localeCompare(b.start || ''));
      return docs.map(m => {
        const start = `${m.date}T${m.start}:00`;
        const end = `${m.date}T${m.end}:00`;
        const mine = currentUser && currentUser.user.uid === m.userId;
        const isAdminView = currentUser && currentUser.role === 'admin';
        
        // ค้นหาชื่อห้องจาก rooms array ถ้าไม่มีใน meeting
        let roomName = m.roomName;
        if (!roomName && m.roomId) {
          const roomData = rooms.find(r => r.id === m.roomId);
          roomName = roomData ? roomData.name : 'ห้องประชุม';
        }
        
        return {
          id: m.id,
          start,
          end,
          title: '', // ไม่แสดงหัวข้อ
          extendedProps: { meeting: m, mine, isAdminView, roomName: m.roomName || '' }
        };
      });
    }

// เราจะเปลี่ยนชื่อฟังก์ชันเป็น fetchCalendarRange เพื่อสื่อความหมายที่ชัดเจนขึ้น
    // และเปลี่ยนไปใช้ getDocs เพื่อดึงข้อมูลเพียงครั้งเดียว
    async function fetchCalendarRange(info, successCallback, failureCallback) {
      try {
        const startStr = ymd(info.start);
        // FullCalendar ส่ง info.end มาเป็นวันแรกของสัปดาห์ถัดไป เราจึงใช้ '<' เพื่อไม่ให้รวมวันนั้นเข้ามา
        const endStr = ymd(info.end);
        

        // สร้าง query เพื่อดึงข้อมูลในช่วงวันที่ที่ต้องการ
        const qRef = query(
          meetingsRef,
          where('date', '>=', startStr),
          where('date', '<', endStr)
        );

        // ใช้ getDocs() เพื่อดึงข้อมูลชุดเดียว ไม่ใช่ realtime
        const snap = await getDocs(qRef);
        const docs = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        
        // ส่งข้อมูลที่แปลงแล้วกลับไปให้ FullCalendar
        successCallback(toEvents(docs));

      } catch (err) {
        console.error('[Calendar] เกิดข้อผิดพลาดในการดึงข้อมูล (fetch):', err);
        if (failureCallback) failureCallback(err);
        successCallback([]); // ส่งค่าว่างกลับไปหากเกิดข้อผิดพลาด
      }
    }


    function renderEventContent(arg) {
      const m = arg.event.extendedProps.meeting;
      const mine = arg.event.extendedProps.mine;
      const isAdminView = arg.event.extendedProps.isAdminView;
      // ดึงชื่อห้องจาก meeting data หรือหาจาก rooms array
      let roomName = m.roomName;
      if (!roomName && m.roomId) {
        const roomData = rooms.find(r => r.id === m.roomId);
        roomName = roomData ? roomData.name : 'ห้องประชุม';
      }
      const hue = hueFromString(m.roomId || '');

      // หาข้อมูลห้องเพื่อดึง floor
      const roomData = rooms.find(r => r.id === m.roomId);
      const floor = roomData ? (roomData.location || roomData.floor || roomData.level) : null;
      const displayName = floor ? `${roomName} ชั้น${floor}` : roomName;

      // Compact: แสดงเฉพาะ "เวลา + ห้อง + ชั้น"
      const root = document.createElement('div');
      root.className = 'evt' + (mine ? ' mine' : (isAdminView ? ' admin' : ''));
      root.style.setProperty('--evt-h', hue);

      const t = document.createElement('span');
      t.className = 'time';
      t.textContent = `${m.start}–${m.end}`;

      const r = document.createElement('span');
      r.className = 'room';
      r.textContent = displayName;

      root.appendChild(t);
      root.appendChild(r);

      return { domNodes: [root] };
    }

    function initCalendar() {
      const calendarEl = document.getElementById('calendar');
      if (!calendarEl) return;

      calendar = new FullCalendar.Calendar(calendarEl, {
        initialView: 'dayGridMonth',
        height: 'auto',
        locale: 'th',
        firstDay: 0,
        fixedWeekCount: false,        // ✅ แสดงเฉพาะสัปดาห์ที่จำเป็น ไม่บังคับ 6 สัปดาห์
        showNonCurrentDates: true,    // ✅ แสดงวันที่นอกเดือนปัจจุบัน (วันที่เทา)
        selectable: true,
        nowIndicator: true,
        allDaySlot: false,
        slotMinTime: '08:00:00',
        slotMaxTime: '19:00:00',       // ✅ จำกัดถึง 18:00
        expandRows: true,
        dayMaxEventRows: true,
        eventOverlap: false,
        timeZone: 'local',
        displayEventTime: false,       // เราแสดงเวลาเอง

        headerToolbar: { left: 'prev,next today', center: 'title', right: 'dayGridMonth,timeGridWeek,timeGridDay,listWeek' },

        //events: (info, success, failure) => subscribeCalendarRange(info, success, failure),
        events: fetchCalendarRange, // <--- แก้ไขบรรทัดนี้
        
        eventContent: renderEventContent,

        dateClick: (info) => {
          // ✅ ถ้าวันนี้: เลือกเป็นครึ่งชั่วโมงถัดไป, ไม่งั้นตั้ง 08:00-09:00
          const todayStr = toYmd(new Date());
          const clicked = ymd(info.date);
          let sMin, eMin;
          if (clicked === todayStr) {
            const nowMin = toMin(nowHM());
            sMin = Math.min(Math.max(8 * 60, roundUpToNext30(nowMin)), 19 * 60 - 30);
            eMin = (sMin + 60 <= 19 * 60) ? sMin + 60 : sMin + 30;
          } else {
            sMin = 8 * 60; eMin = 9 * 60;
          }
          const preStart = minToHH(sMin);
          const preEnd = minToHH(eMin);

          openBookingModal({ mode: 'create-quick', start: preStart, end: preEnd });
          const dateInput = document.getElementById('bookingDate');
          if (dateInput) dateInput.value = ymd(info.date);
        },

        select: (sel) => {
          // ✅ ปัดช่วง selection เป็น step 30 นาที และครอบไว้ใน 08:00–18:00
          const s = new Date(sel.start);
          const e = new Date(sel.end);
          const sMinRaw = s.getHours() * 60 + s.getMinutes();
          const eMinRaw = e.getHours() * 60 + e.getMinutes();
          const sMin = Math.min(Math.max(8 * 60, roundUpToNext30(sMinRaw)), 19 * 60 - 30);
          let eMin = Math.max(sMin + 30, roundUpToNext30(eMinRaw));
          eMin = Math.min(eMin, 19 * 60);

          const preStart = minToHH(sMin);
          const preEnd = minToHH(eMin);

          openBookingModal({ mode: 'create-quick', start: preStart, end: preEnd });
          const dateInput = document.getElementById('bookingDate');
          if (dateInput) dateInput.value = ymd(s);
          calendar.unselect();
        },

        eventClick: (arg) => {
          hideBookingTooltip();
          const m = arg.event.extendedProps && arg.event.extendedProps.meeting;
          if (!m) return;
          const isOwner = currentUser && currentUser.user.uid === m.userId;
          const isAdmin = currentUser && currentUser.role === 'admin';
          
          // ✅ ให้ทุกคนสามารถเปิด modal ได้ แต่จะเป็นโหมด view หรือ edit ขึ้นอยู่กับสิทธิ์
          const mode = (isOwner || isAdmin) ? 'edit' : 'view';
          openBookingModal({ mode, meeting: m, roomId: m.roomId, roomName: m.roomName, date: m.date });
        },

        eventMouseEnter: (arg) => {
          const m = arg.event.extendedProps && arg.event.extendedProps.meeting;
          if (!m) return;
          // Delay 400ms ก่อนแสดง tooltip เพื่อไม่ให้บังอีเวนต์ข้างเคียง
          clearTimeout(tooltipTimeout);
          tooltipTimeout = setTimeout(() => {
            showBookingTooltip(arg.el, m, arg.event.extendedProps.mine);
          }, 500);
        },

        eventMouseLeave: () => {
          clearTimeout(tooltipTimeout);
          hideBookingTooltip();
        }
      });

      calendar.render();
    }

    /* ===== Booking Tooltip Logic ===== */
    let tooltipEl = null;
    let tooltipTimeout = null;

    function showBookingTooltip(targetEl, m, isMine) {
      if (!tooltipEl) tooltipEl = document.getElementById('bookingTooltip');

      const hue = hueFromString(m.roomId || '');
      const roomData = rooms.find(r => r.id === m.roomId);
      const floor = roomData ? (roomData.location || roomData.floor || roomData.level) : null;
      const roomDisplay = floor ? `${m.roomName || 'ห้องประชุม'} ชั้น${floor}` : (m.roomName || 'ห้องประชุม');
      const capacity = roomData ? (roomData.capacity || '') : '';

      const ownerBadge = isMine
        ? '<span class="tt-badge tt-mine"><i class="bi bi-person-fill"></i> ของฉัน</span>'
        : '<span class="tt-badge tt-other"><i class="bi bi-person"></i> ผู้อื่น</span>';

      tooltipEl.innerHTML = `
        <div class="tt-header">
          <span class="tt-color-dot" style="background:hsl(${hue} 65% 55%)"></span>
          <span class="tt-title">${escapeHTML(m.title || 'ไม่มีหัวข้อ')}</span>
          ${ownerBadge}
        </div>
        <div class="tt-row">
          <i class="bi bi-clock"></i>
          <span class="tt-label">เวลา</span>
          <span class="tt-value">${escapeHTML(m.start)} – ${escapeHTML(m.end)}</span>
        </div>
        <div class="tt-row">
          <i class="bi bi-door-open"></i>
          <span class="tt-label">ห้อง</span>
          <span class="tt-value">${escapeHTML(roomDisplay)}${capacity ? ' (' + escapeHTML(String(capacity)) + ' คน)' : ''}</span>

    function isOverlapping(aStart, aEnd, bStart, bEnd) {
      const toF = (s) => { const [h, m] = s.split(':'); return (+h) + (+m) / 60; }
      return (toF(aStart) < toF(bEnd)) && (toF(aEnd) > toF(bStart));
    }

    async function hasOverlap(dateStr, roomId, start, end, excludeId = null) {
      const qDay = query(meetingsRef, where('date', '==', dateStr));
      const snap = await getDocs(qDay);
      const arr = snap.docs.map(d => ({ id: d.id, ...d.data() }))
        .filter(x => x.roomId === roomId && (!excludeId || x.id !== excludeId));
      return arr.some(m => isOverlapping(start, end, m.start, m.end));
    }

    async function fetchDayMeetings(dateStr, roomId, excludeId = null) {
      try {
        const qDay = query(meetingsRef, where('date', '==', dateStr));
        const snap = await getDocs(qDay);
        const all = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        const filtered = all
          .filter(x => x.roomId === roomId && (!excludeId || x.id !== excludeId))
          .sort((a, b) => (a.start || '').localeCompare(b.start || ''));



        return filtered;
      } catch (err) {
        console.error('fetchDayMeetings error:', err);
        return [];
      }
    }

    function fillRoomDropdown(selectEl) {
      selectEl.innerHTML = '';
      rooms.forEach(r => {
        const opt = document.createElement('option');
        const floor = r.location || r.floor || r.level || '';
        const displayName = r.name || '(ไม่มีชื่อ)'; // แสดงเฉพาะชื่อห้อง ไม่รวมชั้น
        opt.value = r.id;
        opt.textContent = displayName;
        // ใช้ location แทน floor/level และเก็บชื่อห้องไว้ใน data attribute
        opt.setAttribute('data-floor', floor);
        opt.setAttribute('data-room-name', displayName);
        selectEl.appendChild(opt);
      });

    // ฟังก์ชันสำหรับโหมดสร้างใหม่ (ไม่มี preStart/preEnd)
    // ฟังก์ชันเดียวรองรับทั้ง create และ edit
    async function fillTimeSelects(roomId, dateStr, { preStart = null, preEnd = null, excludeId = null } = {}) {
      const startSel = document.getElementById('startTime');
      const endSel = document.getElementById('endTime');

      startSel.innerHTML = '';
      endSel.innerHTML = '';
      startSel.onchange = null;

      const submitBtn = bookingForm.querySelector('button[type="submit"]');
      if (!roomId || !dateStr) { if (submitBtn) submitBtn.disabled = true; return; }

      const todayStr = toYmd(new Date());
      const taken = await fetchDayMeetings(dateStr, roomId, excludeId);

      // สร้าง start time options
      let startMin = BOOKING_START;
      if (dateStr === todayStr) {
        const roundedNow = roundUpToNext30(toMin(nowHM()));
        startMin = Math.max(BOOKING_START, Math.min(roundedNow, BOOKING_END - SLOT_INTERVAL));
      }

      let startCandidates = [];
      for (let m = BOOKING_START; m <= BOOKING_END - SLOT_INTERVAL; m += SLOT_INTERVAL) startCandidates.push(minToHH(m));
      if (dateStr === todayStr) {
        startCandidates = startCandidates.filter(t => toMin(t) >= startMin);
      }

      for (const s of startCandidates) {
        const isBusy = taken.some(m => isOverlapping(s, minToHH(toMin(s) + SLOT_INTERVAL), m.start, m.end));
        const opt = document.createElement('option');
        opt.value = s;
        opt.textContent = s;
        if (isBusy) { opt.disabled = true; opt.style.background = '#888'; opt.style.color = '#fff'; }
        startSel.appendChild(opt);
      }

      // ตั้งค่า start
      if (preStart && Array.from(startSel.options).some(o => o.value === preStart && !o.disabled)) {
        startSel.value = preStart;
      } else {
        const firstAvailable = Array.from(startSel.options).find(o => !o.disabled);
        if (firstAvailable) startSel.value = firstAvailable.value;
      }

      // สร้าง end time options
      let isFirstRebuild = true;
      function rebuildEnds() {
        endSel.innerHTML = '';
        const sVal = startSel.value;
        if (!sVal) { if (submitBtn) submitBtn.disabled = true; return; }
        const sMin = toMin(sVal);
        for (let m = sMin + SLOT_INTERVAL; m <= BOOKING_END; m += SLOT_INTERVAL) {
          const e = minToHH(m);
          const isBusy = taken.some(mtg => isOverlapping(sVal, e, mtg.start, mtg.end));
          const opt = document.createElement('option');
          opt.value = e;
          opt.textContent = e;
          if (isBusy) { opt.disabled = true; opt.style.background = '#888'; opt.style.color = '#fff'; }
          endSel.appendChild(opt);
        }

        // ตั้งค่า end
        if (isFirstRebuild && preEnd && Array.from(endSel.options).some(o => o.value === preEnd && !o.disabled)) {
          endSel.value = preEnd;
        } else {
          const firstAvailable = Array.from(endSel.options).find(o => !o.disabled);
          if (firstAvailable) endSel.value = firstAvailable.value;
        }
        isFirstRebuild = false;
        if (submitBtn) submitBtn.disabled = endSel.options.length === 0 || !endSel.value;
      }

      startSel.onchange = rebuildEnds;
      rebuildEnds();
    }

      todayDocs.forEach(m => {
        const rid = m.roomId || `misc:${m.roomName || 'ห้อง'}`;
        if (!grouped[rid]) {
          const meta = roomMap[rid] || {};
          grouped[rid] = {
            name: m.roomName || meta.name || '(ไม่มีชื่อ)',
            floor: meta.location ?? meta.floor ?? meta.level ?? null,
            capacity: meta.capacity ?? meta.cap ?? null,
            prev: [], now: [], next: []
          };
        }
        const s = hm2m(m.start), e = hm2m(m.end);
        if (e <= nowM) grouped[rid].prev.push(m);
        else if (s <= nowM && nowM < e) grouped[rid].now.push(m);
        else grouped[rid].next.push(m);
      });

      // วาดการ์ดห้อง
      Object.entries(grouped)
        .sort((a, b) => a[1].name.localeCompare(b[1].name))
        .forEach(([rid, grp]) => {
          const hue = hueFromString(rid);
          const card = document.createElement('div');
          card.className = 'room-card';
          card.style.setProperty('--room-h', hue);

          const capVal = grp.capacity ?? null;
          const capTxt = (capVal || capVal === 0) ? `${capVal} คน` : null;
          const metaTxt = [capTxt].filter(Boolean).join(' • ');
          const metaHtml = metaTxt ? ` <small class="text-secondary">(${metaTxt})</small>` : '';

          const isBusy = (grp.now && grp.now.length > 0);

          const head = document.createElement('div');
          head.className = 'title';

          const dotSpan = document.createElement('span');
          dotSpan.className = 'dot';
          head.appendChild(dotSpan);

          const nameSpan = document.createElement('span');
          nameSpan.textContent = grp.name;
          if (grp.floor) {
            const floorSmall = document.createElement('small');
            floorSmall.className = 'text-secondary';
            floorSmall.textContent = ` (ชั้น ${grp.floor})`;
            nameSpan.appendChild(floorSmall);
          }
          if (metaTxt) {
            const metaSmall = document.createElement('small');
            metaSmall.className = 'text-secondary';
            metaSmall.textContent = ` (${metaTxt})`;
            nameSpan.appendChild(metaSmall);
          }
          head.appendChild(nameSpan);

          const pillSpan = document.createElement('span');
          pillSpan.className = 'pill';
          pillSpan.innerHTML = '<i class="bi bi-calendar3"></i> วันนี้';
          head.appendChild(pillSpan);

          const liveSpan = document.createElement('span');
          liveSpan.className = `live-pill ${isBusy ? 'busy' : 'free'}`;
          liveSpan.innerHTML = `<span class="beacon"></span>${isBusy ? 'ไม่ว่าง' : 'ว่างตอนนี้'}`;
          head.appendChild(liveSpan);
          card.appendChild(head);

          const mk = (lbl, arr, kind) => {
            const sec = document.createElement('div'); sec.className = `status-kind-${kind}`;
            const lb = document.createElement('div'); lb.className = 'section-label';
            lb.innerHTML = (kind === 'prev' ? '<i class="bi bi-clock-history"></i>' :
              kind === 'now' ? '<i class="bi bi-broadcast-pin"></i>' :
                '<i class="bi bi-calendar-event"></i>') + ' ' + lbl;
            sec.appendChild(lb);
            const list = document.createElement('div');
            arr.sort((x, y) => (x.start || '').localeCompare(y.start || ''));
            if (!arr.length) {
              const none = document.createElement('div');
              none.className = 'text-secondary small'; none.textContent = '—';
              list.appendChild(none);
            } else {
              arr.forEach(m => {
                const item = document.createElement('div'); item.className = 'status-item';
                const left = document.createElement('div'); left.className = 'd-flex align-items-center gap-2';
                left.innerHTML = '<i class="bi bi-dot"></i>';
                const chip = document.createElement('span'); chip.className = 'status-chip'; chip.textContent = `${m.start}–${m.end}`;
                left.appendChild(chip);
                const right = document.createElement('div'); right.className = 'small text-secondary text-truncate';
                right.textContent = (m.bookerName || m.userName || '').trim();
                item.appendChild(left); item.appendChild(right);
                list.appendChild(item);
              });
            }
            sec.appendChild(list); return sec;
          };

          // เลือก 1 รายการ: "ก่อนหน้านี้" = อันที่เพิ่งจบ (end ใกล้ตอนนี้ที่สุด)
          //                 "หลังจากนี้"  = อันที่ใกล้จะเริ่ม (start เร็วที่สุดที่ยังไม่ถึง)
          const prevSorted = [...grp.prev].sort((a, b) => hm2m(a.end) - hm2m(b.end));
          const nextSorted = [...grp.next].sort((a, b) => hm2m(a.start) - hm2m(b.start));
          const prevOne = prevSorted.length ? [prevSorted[prevSorted.length - 1]] : [];
          const nextOne = nextSorted.length ? [nextSorted[0]] : [];

          card.appendChild(mk('ก่อนหน้านี้', prevOne, 'prev'));
          card.appendChild(mk('ขณะนี้', grp.now, 'now'));
          card.appendChild(mk('หลังจากนี้', nextOne, 'next'));


          cont.appendChild(card);
        });
    }

    let statusIntervalId = null;
    function subscribeTodayStatus() {
      const todayStr = toYmd(new Date());
      if (unsubToday) { unsubToday(); unsubToday = null; }
      if (statusIntervalId) { clearInterval(statusIntervalId); statusIntervalId = null; }
      const qToday = query(meetingsRef, where('date', '==', todayStr));
      unsubToday = onSnapshot(qToday, snap => {
        todayDocs = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        renderStatusPanelByRoom();
      }, _err => { todayDocs = []; renderStatusPanelByRoom(); });
      statusIntervalId = setInterval(renderStatusPanelByRoom, 10000);
    }

    // ---- Init ----
    function init() {
      document.getElementById('btnQuickAdd').addEventListener('click', () => {
        // เปิด modal ปกติ
        const today = new Date();
        const todayStr = toYmd(today);
        let sMin, eMin;
        const nowMin = toMin(nowHM());
        sMin = Math.min(Math.max(8 * 60, roundUpToNext30(nowMin)), 19 * 60 - 30);
        eMin = (sMin + 60 <= 19 * 60) ? sMin + 60 : sMin + 30;

        openBookingModal({ mode: 'create-quick', start: minToHH(sMin), end: minToHH(eMin) });
        const dateInput = document.getElementById('bookingDate');
        if (dateInput) dateInput.value = todayStr;
      });

      if (!calendar) initCalendar();

      // rooms subscribe
      onSnapshot(query(roomsRef, orderBy('name')), snap => {
        rooms = snap.docs.map(d => ({ id: d.id, ...d.data() })).filter(r => r.isActive !== false);
        renderStatusPanelByRoom();
      });

      // today status
      subscribeTodayStatus();
    }
  </script>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
