<!doctype html>
<html lang="th" data-bs-theme="light">
<script>document.documentElement.setAttribute('data-bs-theme', localStorage.getItem('theme') || 'light');</script>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>รายงานภาพรวมการจองห้องประชุม</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <link href="assets/css/styles.css" rel="stylesheet" />
  <script src="assets/js/menu.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <style>
    .card { border:0; box-shadow: 0 10px 28px rgba(0,0,0,.08); border-radius:16px; padding:16px; margin-bottom:16px; }
    .summary-card { min-width: 160px; }
    .table-responsive { max-height: 500px; overflow-y: auto; }

    /* Pagination transition — luxury stagger */
    #bookingsTable tbody tr {
      opacity: 0;
      transform: translateY(12px) scale(.98);
      filter: blur(2px);
    }
    #bookingsTable tbody tr.row-enter {
      animation: rowSlideIn .4s cubic-bezier(.22,.61,.36,1) forwards;
    }
    #bookingsTable tbody.rows-exit tr {
      animation: rowSlideOut .2s cubic-bezier(.55,.06,.68,.19) forwards;
    }
    @keyframes rowSlideIn {
      0%   { opacity: 0; transform: translateY(14px) scale(.97); filter: blur(3px); }
      60%  { filter: blur(0); }
      100% { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
    }
    @keyframes rowSlideOut {
      0%   { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
      100% { opacity: 0; transform: translateY(-8px) scale(.97); filter: blur(2px); }
    }

    /* Pagination buttons */
    #tablePagination .btn { transition: all .2s ease; }
    #tablePagination .btn:not(:disabled):hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(0,0,0,.1); }
  </style>
</head>
<body>
  <div id="navbar-placeholder"></div>
  <div id="sidebar-placeholder"></div>
  <main class="container-fluid px-3 px-md-4" style="padding-top:80px;">
    <h2 class="fw-bold mb-3">รายงานภาพรวมการจองห้องประชุม</h2>
    <div class="row g-3 mb-4">
      <div class="col-auto">
        <label class="form-label">ช่วงวันที่</label>
        <input type="date" id="dateStart" class="form-control" value="" />
      </div>
      <div class="col-auto">
        <label class="form-label">ถึง</label>
        <input type="date" id="dateEnd" class="form-control" value="" />
      </div>
      <div class="col-auto">
        <label class="form-label">ห้องประชุม</label>
        <select id="roomFilter" class="form-select"><option value="">ทุกห้อง</option></select>
      </div>
      <div class="col-auto">
        <label class="form-label">ผู้จอง</label>
        <input type="text" id="userFilter" class="form-control" placeholder="ค้นหาชื่อผู้จอง" />
      </div>
      <div class="col-auto align-self-end">
        <button id="btnFilter" class="btn btn-primary">กรองข้อมูล</button>
        <button id="btnExport" class="btn btn-outline-success ms-2"><i class="bi bi-file-earmark-excel"></i> Export</button>
      </div>
    </div>
    <div class="row g-3 mb-4">
      <div class="col-md-3">
        <div class="card summary-card text-center">
          <div class="fw-bold fs-3" id="totalBookings">0</div>
          <div class="text-secondary">จำนวนการจอง</div>
        </div>
      </div>
      <div class="col-md-3">
        <div class="card summary-card text-center">
          <div class="fw-bold fs-3" id="totalRooms">0</div>
          <div class="text-secondary">ห้องที่ถูกใช้งาน</div>
        </div>
      </div>
      <div class="col-md-3">
        <div class="card summary-card text-center">
          <div class="fw-bold fs-3" id="totalUsers">0</div>
          <div class="text-secondary">ผู้จองทั้งหมด</div>
        </div>
      </div>
    </div>
    <div class="row g-3 mb-4">
      <div class="col-md-6">
        <div class="card">
          <h6 class="fw-bold">จำนวนการจองรายวัน</h6>
          <canvas id="bookingsChart" height="320" style="max-height:320px;"></canvas>
        </div>
      </div>
      <div class="col-md-6">
        <div class="card">
          <h6 class="fw-bold">สัดส่วนการใช้งานแต่ละห้อง</h6>
          <canvas id="roomsPieChart" height="320" style="max-height:320px;"></canvas>
        </div>
      </div>
    </div>
    <div class="card mb-4">
      <h6 class="fw-bold">รายละเอียดการจอง</h6>
      <div class="table-responsive">
        <table class="table table-bordered table-hover" id="bookingsTable">
          <thead class="table-light">
            <tr>
              <th>วันที่</th>
              <th>เวลา</th>
              <th>ห้องประชุม</th>
              <th>ผู้จอง</th>
              <th>เรื่อง</th>
              <th>เบอร์ติดต่อ</th>
              <th>สถานะ</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </div>
  </main>
  <script type="module">
    import { collection, query, where, orderBy, getDocs, limit, startAfter } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js";
    import { db } from "./assets/js/firebase-config.js";
    import { initAuthGuard } from "./assets/js/auth-guard.js";
    import { $, escapeHTML } from "./assets/js/utils.js";

    let currentUser = null;
    const roomsRef = collection(db, 'meeting_rooms');
    const meetingsRef = collection(db, 'meetings');
    const PAGE_SIZE = 500; // Firestore batch size limit
    // --- UI Elements ---
    const bookingsTableBody = $('#bookingsTable tbody');
    const bookingsChartEl = $('#bookingsChart');
    const roomsPieChartEl = $('#roomsPieChart');
    // --- State ---
    let rooms = [];
    let bookings = [];
    // --- Chart.js ---
    let bookingsChart, roomsPieChart;
    // --- Table pagination ---
    const TABLE_PAGE_SIZE = 50;
    let tablePage = 0;

    // --- Set default date range to MTD ---
    function setDefaultMTD() {
      const now = new Date();
      const firstDay = new Date(now.getFullYear(), now.getMonth(), 1);
      const fmt = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
      $('#dateStart').value = fmt(firstDay);
      $('#dateEnd').value = fmt(now);
    }

    // --- Load Rooms ---
    async function loadRooms() {
      const snap = await getDocs(query(roomsRef, orderBy('name')));
      rooms = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      const roomFilter = $('#roomFilter');
      roomFilter.innerHTML = '<option value="">ทุกห้อง</option>';
      rooms.forEach(r => {
        const opt = document.createElement('option');
        opt.value = r.id;
        opt.textContent = r.name || '(ไม่มีชื่อ)';
        roomFilter.appendChild(opt);
      });
    }
    // --- Load Bookings (paginated Firestore reads) ---
    async function loadBookings() {
      const dateStart = $('#dateStart').value;
      const dateEnd = $('#dateEnd').value;
      const roomId = $('#roomFilter').value;
      const userFilter = $('#userFilter').value.trim();

      // Fetch in batches of PAGE_SIZE to avoid huge single reads
      bookings = [];
      let lastDoc = null;
      let hasMore = true;
      while (hasMore) {
        let q = query(meetingsRef, orderBy('date'), limit(PAGE_SIZE));
        if (dateStart) q = query(meetingsRef, orderBy('date'), where('date', '>=', dateStart), where('date', '<=', dateEnd || '9999-12-31'), limit(PAGE_SIZE));
        if (lastDoc) {
          if (dateStart) {
            q = query(meetingsRef, orderBy('date'), where('date', '>=', dateStart), where('date', '<=', dateEnd || '9999-12-31'), startAfter(lastDoc), limit(PAGE_SIZE));
          } else {
            q = query(meetingsRef, orderBy('date'), startAfter(lastDoc), limit(PAGE_SIZE));
          }
        }
        const snap = await getDocs(q);
        snap.docs.forEach(d => bookings.push({ id: d.id, ...d.data() }));
        lastDoc = snap.docs[snap.docs.length - 1] || null;
        hasMore = snap.docs.length === PAGE_SIZE;
      }

      // Client-side filters
      if (roomId) bookings = bookings.filter(b => b.roomId === roomId);
      if (userFilter) bookings = bookings.filter(b => (b.bookerName || b.userName || '').includes(userFilter));

      tablePage = 0;
      renderSummary();
      renderCharts();
      renderTable();
    }
    // --- Render Summary ---
    function renderSummary() {
      $('#totalBookings').textContent = bookings.length;
      $('#totalRooms').textContent = [...new Set(bookings.map(b => b.roomId))].length;
      // Use userId for accurate distinct count (L5 fix)
      $('#totalUsers').textContent = [...new Set(bookings.map(b => b.userId || b.bookerName || b.userName))].length;
    }
    // --- Render Charts ---
    function renderCharts() {
      // Bookings per day
      const byDate = {};
      bookings.forEach(b => { byDate[b.date] = (byDate[b.date] || 0) + 1; });
      const dateLabels = Object.keys(byDate).sort();
      const dateCounts = dateLabels.map(d => byDate[d]);
      if (bookingsChart) bookingsChart.destroy();
      bookingsChart = new Chart(bookingsChartEl, {
        type: 'bar',
        data: { labels: dateLabels, datasets: [{ label: 'จำนวนการจอง', data: dateCounts, backgroundColor: '#0d6efd' }] },
        options: { plugins: { legend: { display: false } } }
      });
      // Room usage pie
      const byRoom = {};
      bookings.forEach(b => { byRoom[b.roomId] = (byRoom[b.roomId] || 0) + 1; });
      const roomLabels = rooms.filter(r => byRoom[r.id]).map(r => r.name || '(ไม่มีชื่อ)');
      const roomCounts = rooms.filter(r => byRoom[r.id]).map(r => byRoom[r.id]);
      if (roomsPieChart) roomsPieChart.destroy();
      roomsPieChart = new Chart(roomsPieChartEl, {
        type: 'pie',
        data: { labels: roomLabels, datasets: [{ data: roomCounts, backgroundColor: ['#0d6efd','#198754','#ffc107','#dc3545','#6f42c1','#20c997','#fd7e14'] }] },
        options: { plugins: { legend: { position: 'bottom' } } }
      });
    }
    // --- Render Table (paginated with stagger animation) ---
    function renderTable(animate = true) {
      bookingsTableBody.innerHTML = '';
      const start = tablePage * TABLE_PAGE_SIZE;
      const end = Math.min(start + TABLE_PAGE_SIZE, bookings.length);
      const pageData = bookings.slice(start, end);

      if (pageData.length === 0) {
        const tr = document.createElement('tr');
        tr.innerHTML = '<td colspan="7" class="text-center text-secondary py-3">ไม่พบข้อมูล</td>';
        tr.style.opacity = '1';
        tr.style.transform = 'none';
        tr.style.filter = 'none';
        bookingsTableBody.appendChild(tr);
      } else {
        pageData.forEach((b, i) => {
          const tr = document.createElement('tr');
          const fields = [
            b.date || '',
            `${b.start || ''}–${b.end || ''}`,
            rooms.find(r => r.id === b.roomId)?.name || b.roomName || '',
            b.bookerName || b.userName || '',
            b.title || '',
            b.contact || '',
            b.status || 'ยืนยัน'
          ];
          fields.forEach(text => {
            const td = document.createElement('td');
            td.textContent = text;
            tr.appendChild(td);
          });
          bookingsTableBody.appendChild(tr);

          if (animate) {
            // stagger: แต่ละแถวเริ่ม animation ห่างกัน 25ms
            setTimeout(() => tr.classList.add('row-enter'), i * 25);
          } else {
            tr.style.opacity = '1';
            tr.style.transform = 'none';
            tr.style.filter = 'none';
          }
        });
      }

      renderPagination();
    }

    function renderPagination() {
      let paginationEl = document.getElementById('tablePagination');
      if (!paginationEl) {
        paginationEl = document.createElement('div');
        paginationEl.id = 'tablePagination';
        paginationEl.className = 'd-flex justify-content-between align-items-center mt-2';
        $('#bookingsTable').parentElement.after(paginationEl);
      }

      const totalPages = Math.max(1, Math.ceil(bookings.length / TABLE_PAGE_SIZE));
      const start = tablePage * TABLE_PAGE_SIZE + 1;
      const end = Math.min((tablePage + 1) * TABLE_PAGE_SIZE, bookings.length);

      paginationEl.innerHTML = `
        <span class="text-secondary small">แสดง ${bookings.length > 0 ? start : 0}–${end} จาก ${bookings.length} รายการ</span>
        <div class="d-flex gap-1">
          <button class="btn btn-sm btn-outline-secondary" id="pgPrev" ${tablePage === 0 ? 'disabled' : ''}>&#9664; ก่อนหน้า</button>
          <span class="btn btn-sm btn-light disabled">${tablePage + 1} / ${totalPages}</span>
          <button class="btn btn-sm btn-outline-secondary" id="pgNext" ${tablePage >= totalPages - 1 ? 'disabled' : ''}>ถัดไป &#9654;</button>
        </div>
      `;

      document.getElementById('pgPrev')?.addEventListener('click', () => { if (tablePage > 0) { tablePage--; animatePageChange(); } });
      document.getElementById('pgNext')?.addEventListener('click', () => { if (tablePage < totalPages - 1) { tablePage++; animatePageChange(); } });
    }
    function animatePageChange() {
      const tbody = $('#bookingsTable tbody');
      // Exit: เล่น slide-out ทุกแถวพร้อมกัน
      tbody.classList.add('rows-exit');
      setTimeout(() => {
        tbody.classList.remove('rows-exit');
        // Enter: render ใหม่พร้อม stagger animation
        renderTable(true);
      }, 220);
    }

    // --- Export Excel (.xlsx) ---
    $('#btnExport').addEventListener('click', () => {
    // สร้างข้อมูลจาก bookingsTable โดยตรง (ภาษาไทย)
    const table = document.getElementById('bookingsTable');
    const ws = XLSX.utils.table_to_sheet(table, {raw:true});
    // สร้าง workbook
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, 'Bookings');
    // สร้างชื่อไฟล์ booking_report_YYYY-MM-DD_HH-mm.xlsx
    const now = new Date();
    const pad = n => String(n).padStart(2,'0');
    const dateStr = `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())}`;
    const timeStr = `${pad(now.getHours())}-${pad(now.getMinutes())}`;
    const filename = `booking_report_${dateStr}_${timeStr}.xlsx`;
    XLSX.writeFile(wb, filename);
    });
    // --- Filter ---
    $('#btnFilter').addEventListener('click', loadBookings);
    // --- Init ---
    // --- Auth ---
    initAuthGuard((user, name, role) => {
      currentUser = { user, role, name };
      // Guard: เฉพาะ admin และ manager เท่านั้น
      if (role !== 'admin' && role !== 'manager') {
        document.querySelector('main').innerHTML = `
          <div class="alert alert-warning mt-4" role="alert">
            <i class="bi bi-shield-lock"></i> หน้านี้สำหรับ <strong>Admin</strong> และ <strong>Manager</strong> เท่านั้น
          </div>`;
        return;
      }
      setDefaultMTD();
      loadRooms().then(loadBookings);
    });
  </script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
