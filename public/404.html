<!DOCTYPE html>
<html lang="th">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Page Not Found</title>

    <style media="screen">
      body {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        background-attachment: fixed;
        color: rgba(0,0,0,0.87);
        font-family: 'Inter', 'Segoe UI', -apple-system, sans-serif;
        margin: 0; padding: 0;
        min-height: 100vh;
        display: flex; align-items: center; justify-content: center;
      }
      #message {
        background: rgba(255,255,255,.75);
        -webkit-backdrop-filter: blur(20px);
        backdrop-filter: blur(20px);
        border: 1px solid rgba(255,255,255,.45);
        max-width: 400px; width: 90%;
        margin: 40px auto;
        padding: 40px 32px 24px;
        border-radius: 24px;
        box-shadow: 0 24px 48px rgba(0,0,0,.12), 0 8px 16px rgba(102,126,234,.1);
      }
      #message h3 { color: #718096; font-weight: 500; font-size: 14px; margin: 16px 0 10px; }
      #message h2 {
        font-size: 4rem; font-weight: 900; margin: 0 0 8px;
        background: linear-gradient(135deg, #667eea, #764ba2);
        -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        background-clip: text;
      }
      #message h1 { font-size: 1.3rem; font-weight: 600; color: #2d3748; margin: 0 0 16px; }
      #message p { line-height: 160%; margin: 12px 0 24px; font-size: 14px; color: #4a5568; }
      #message a {
        display: block; text-align: center;
        background: linear-gradient(135deg, #667eea, #764ba2);
        text-transform: uppercase; text-decoration: none; color: white;
        padding: 14px; border-radius: 14px; font-weight: 600;
        box-shadow: 0 4px 16px rgba(102,126,234,.25);
        transition: all .25s ease;
      }
      #message a:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(102,126,234,.35); }
      @media (max-width: 600px) {
        #message { margin: 20px; }
      }
    </style>
  </head>
  <body>
    <div id="message">
      <h2>404</h2>
      <h1>Page Not Found</h1>
      <p>The specified file was not found on this website. Please check the URL for mistakes and try again.</p>
      <h3>Why am I seeing this?</h3>
      <p>This page was generated by the Firebase Command-Line Interface. To modify it, edit the <code>404.html</code> file in your project's configured <code>public</code> directory.</p>
    </div>
  </body>
</html>
